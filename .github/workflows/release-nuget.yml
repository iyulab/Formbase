name: Release NuGet Packages

# File-version trigger: bumping <Version> in Directory.Build.props and pushing to main
# publishes that version. --skip-duplicate makes re-runs and no-op bumps safe.
on:
  push:
    branches: [main]
    paths:
      - 'Directory.Build.props'
  workflow_dispatch:

concurrency:
  group: release-nuget
  cancel-in-progress: false

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from Directory.Build.props
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read <Version> from Directory.Build.props"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Formbase.slnx

      - name: Build
        run: dotnet build Formbase.slnx --no-restore --configuration Release

      # Gate the release on a green suite — never publish an unverified package.
      - name: Test
        run: dotnet test Formbase.slnx --no-build --configuration Release --verbosity normal

      # Packs every IsPackable project in the solution:
      # Formbase.Core, Formbase.MorphDb, Formbase.Postgres, Formbase.DependencyInjection.
      - name: Pack
        run: dotnet pack Formbase.slnx --no-build --configuration Release --output ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Symbol packages are supported by NuGet.org but not by GitHub Packages.
      - name: Push symbols to NuGet.org
        run: dotnet nuget push ./nupkgs/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/iyulab/index.json --skip-duplicate
