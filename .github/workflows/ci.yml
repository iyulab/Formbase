name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# A newer push to the same ref supersedes an in-flight run (saves Actions minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Formbase.slnx

      - name: Build
        run: dotnet build Formbase.slnx --no-restore --configuration Release

      # Live tests are excluded from compilation unless their opt-in flag is set, so the default
      # suite needs no Docker host or service containers. The Postgres suite runs in its own job.
      - name: Test
        run: dotnet test Formbase.slnx --no-build --configuration Release --verbosity normal

  postgres-live:
    name: Postgres Live Contract
    runs-on: ubuntu-latest
    # Gated on the cheap suite: a compile error or a plain-suite regression should not also burn
    # container-pulling minutes here. The live flag changes which files compile, so this job cannot
    # reuse the build job's output and rebuilds regardless.
    needs: build
    # The runner already provides a Docker daemon, and the fixture starts its own postgres through
    # Testcontainers — so this needs no `services:` block, only the opt-in flag.
    # Bounds the job independently of the fixture's own readiness timeout: a wedged daemon or a slow
    # image pull costs a few minutes of Actions time, not the six-hour default.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # The flag changes which files compile, so restore/build/test all carry it.
      - name: Test (Postgres live contract)
        run: dotnet test Formbase.slnx --configuration Release --verbosity normal -p:IncludePostgresLiveTests=true

  morphdb-live:
    name: MorphDB Live Contract
    runs-on: ubuntu-latest
    # Same gating as postgres-live: don't burn container minutes on a build that already failed.
    needs: build
    # The fixture starts morphdb and its postgres through Testcontainers and provisions its own
    # project, so no `services:` block and no seeded state are needed -- only the opt-in flag.
    # Two containers and an image pull make this the slowest job, hence the wider bound.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # This is the job that catches a MorphDB.Client release drifting from the server: the client
      # comes from nuget.org and the server from ghcr, so nothing here pins them to each other.
      - name: Test (MorphDB live contract)
        run: dotnet test Formbase.slnx --configuration Release --verbosity normal -p:IncludeMorphDbLiveTests=true

  quality:
    name: Format & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Formbase.slnx

      - name: Check formatting
        run: dotnet format Formbase.slnx --verify-no-changes --verbosity diagnostic

      - name: Check for vulnerable packages
        run: dotnet list Formbase.slnx package --vulnerable --include-transitive
