name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# A newer push to the same ref supersedes an in-flight run (saves Actions minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Formbase.slnx

      - name: Build
        run: dotnet build Formbase.slnx --no-restore --configuration Release

      # Live/ tests (Testcontainers + real MorphDB) are excluded from compilation unless
      # IncludeLiveTests=true, so the default suite needs no Docker host or service containers.
      - name: Test
        run: dotnet test Formbase.slnx --no-build --configuration Release --verbosity normal

  quality:
    name: Format & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Formbase.slnx

      - name: Check formatting
        run: dotnet format Formbase.slnx --verify-no-changes --verbosity diagnostic

      - name: Check for vulnerable packages
        run: dotnet list Formbase.slnx package --vulnerable --include-transitive
